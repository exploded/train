{{- /* []viewActivityCol, oldest -> newest, 16 weeks. Each col holds 7 cells (Sun..Sat) and an optional Month label. */ -}}
<section class="activity" aria-labelledby="activity-h">
  <h2 id="activity-h" class="section-h">Last 16 weeks</h2>
  <div class="activity__layout">
    <div class="activity__months" aria-hidden="true">
      {{range .}}<span>{{.Month}}</span>{{end}}
    </div>
    <div class="activity__weekdays" aria-hidden="true">
      <span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span>
    </div>
    <div class="activity__grid">
      {{range .}}{{range .Cells}}{{if eq .State "pad"}}<span class="activity__cell activity__cell--pad" aria-hidden="true"></span>{{else}}<span class="activity__cell activity__cell--{{.State}}" title="{{.Date}}"></span>{{end}}{{end}}{{end}}
    </div>
  </div>
  <div class="activity__legend">
    <span class="activity__cell activity__cell--rest"></span><span class="activity__legend-lbl">rest</span>
    <span class="activity__cell activity__cell--partial"></span><span class="activity__legend-lbl">started</span>
    <span class="activity__cell activity__cell--done"></span><span class="activity__legend-lbl">done</span>
  </div>
</section>
