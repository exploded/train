{{- /* viewSettingsRow */ -}}
<li class="settings-row" id="settings-row-{{.ID}}" data-id="{{.ID}}">
  {{if .IsCustom}}<input type="checkbox" id="edit-{{.ID}}" class="row-edit-toggle">{{end}}
  <button type="button" class="drag-handle js-drag-handle" aria-label="Reorder {{.Name}}" tabindex="-1">
    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
      <circle cx="6" cy="3" r="1.4"></circle><circle cx="10" cy="3" r="1.4"></circle>
      <circle cx="6" cy="8" r="1.4"></circle><circle cx="10" cy="8" r="1.4"></circle>
      <circle cx="6" cy="13" r="1.4"></circle><circle cx="10" cy="13" r="1.4"></circle>
    </svg>
  </button>
  <span class="settings-row__name{{if .Hidden}} settings-row__name--off{{end}}">{{.Name}}</span>
  {{if .IsCustom}}
    <form class="row-rename"
          hx-post="/settings/exercises/{{.ID}}/rename"
          hx-target="#settings-row-{{.ID}}"
          hx-swap="outerHTML">
      <input class="row-rename__input" type="text" name="name" value="{{.Name}}"
             minlength="1" maxlength="40" autocomplete="off" required>
      <button type="submit" class="row-rename__save">Save</button>
      <label for="edit-{{.ID}}" class="row-rename__cancel" aria-label="Cancel rename">&times;</label>
    </form>
    <label for="edit-{{.ID}}" class="row-action row-action--rename" aria-label="Rename {{.Name}}">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </svg>
    </label>
    <button type="button"
            class="row-action row-action--delete"
            aria-label="Delete {{.Name}}"
            hx-post="/settings/exercises/{{.ID}}/delete"
            hx-confirm="Delete {{.Name}}? Past workouts keep their history."
            hx-target="#settings-row-{{.ID}}"
            hx-swap="outerHTML">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"></path>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"></path>
      </svg>
    </button>
  {{end}}
  <button class="toggle{{if not .Hidden}} toggle--on{{end}}"
          role="switch"
          aria-checked="{{if .Hidden}}false{{else}}true{{end}}"
          aria-label="Toggle {{.Name}}"
          hx-post="/settings/exercise/{{.ID}}/toggle"
          hx-target="#settings-row-{{.ID}}"
          hx-swap="outerHTML">
    <span class="toggle__knob"></span>
  </button>
</li>
